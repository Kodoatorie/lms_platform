version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu}
      POSTGRES_DB:       ${POSTGRES_DB:-edutech}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      PORT:                3000
      POSTGRES_URI:        postgresql://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edutech}
      REDIS_URL:           redis://redis:6379
      JWT_SECRET:          ${JWT_SECRET:-changeme}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:-changeme_refresh}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MINIO_ENDPOINT:      minio
      MINIO_PORT:          9000
      MINIO_USE_SSL:       false
      MINIO_ACCESS_KEY:    ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:    ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_REGION:        us-east-1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
