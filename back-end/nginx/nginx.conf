worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Basic settings ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied    any;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/m;

    # ── Upstream servers ──────────────────────────────────────────────────────
    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3001;
        keepalive 16;
    }

    upstream minio_s3 {
        server minio:9000;
    }

    # ── HTTP → redirect to HTTPS (uncomment in production) ───────────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;
        server_name _;

        # SSL (uncomment in production and place certs in nginx/ssl/)
        # ssl_certificate     /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options           DENY         always;
        add_header X-Content-Type-Options    nosniff      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           strict-origin-when-cross-origin always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 210M;  # cover max material upload (200 MB + overhead)

        # ── Health check (used by docker HEALTHCHECK) ─────────────────────────
        location = /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # ── Auth endpoints — strict rate limit ───────────────────────────────
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── File uploads — relaxed rate, big body ─────────────────────────────
        location ~ ^/api/(courses/[^/]+/cover|lessons/[^/]+/files) {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 210M;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # allow slow uploads
            proxy_send_timeout 300s;
        }

        # ── Webhook — no rate limit (provider IPs only) ───────────────────────
        location = /api/orders/webhook {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── MinIO public bucket (course covers) ───────────────────────────────
        location /public-assets/ {
            proxy_pass         http://minio_s3/public-assets/;
            proxy_http_version 1.1;
            proxy_set_header   Host minio:9000;
            expires            7d;
            add_header         Cache-Control "public, immutable";
        }

        # ── Swagger docs ──────────────────────────────────────────────────────
        location /api-docs {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Next.js frontend (everything else) ───────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Next.js static assets — aggressive caching ────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            expires    365d;
            add_header Cache-Control "public, immutable";
        }
    }
}
